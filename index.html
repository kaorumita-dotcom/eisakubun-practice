<script type="text/babel">
const {useState,useRef,useEffect,useCallback} = React;

const QUESTIONS = [
  {id:"1-01",type:1,typeName:"主語-解説型エラー",jp:"留学で英語を学べる。",answer:"You can learn English by studying abroad.",mistake:"Studying abroad can learn English.",hint:"「学ぶ」のは誰？→ You を主語にしよう。ヒント表現: by studying abroad（留学することで）"},
  {id:"1-02",type:1,typeName:"主語-解説型エラー",jp:"留学で語学力を伸ばせる。",answer:"You can develop your language skills by studying abroad.",mistake:"Studying abroad can develop language skills.",hint:"「伸ばす」のは誰？→ You を主語にしよう。ヒント表現: develop your language skills（語学力を伸ばす）"},
  {id:"1-03",type:1,typeName:"主語-解説型エラー",jp:"留学で海外の文化を学べる。",answer:"You can learn about foreign culture by studying abroad.",mistake:"Studying abroad can learn overseas culture.",hint:"「学ぶ」のは誰？→ You を主語にしよう。ヒント表現: learn about foreign culture（海外の文化を学ぶ）"},
  {id:"1-04",type:1,typeName:"主語-解説型エラー",jp:"外国の友達と話して異なる価値観を学べる。",answer:"You can learn about different values by talking with foreign friends.",mistake:"Talking with foreign friends can learn about different values.",hint:"「学ぶ」のは誰？→ You を主語にしよう。ヒント表現: by talking with foreign friends（外国の友達と話して）"},
  {id:"1-05",type:1,typeName:"主語-解説型エラー",jp:"一生の思い出を作れる。",answer:"You can make unforgettable memories.",mistake:"It can get forever memories.",hint:"「作る」のは誰？→ You を主語にしよう。ヒント表現: make unforgettable memories（一生の思い出を作る）"},
  {id:"1-06",type:1,typeName:"主語-解説型エラー",jp:"留学するととても緊張する。",answer:"You feel very nervous when you study abroad.",mistake:"Studying abroad is very feel nervous.",hint:"「緊張する」のは誰？→ You を主語にしよう。ヒント表現: feel very nervous（とても緊張する）/ when you study abroad"},
  {id:"1-07",type:1,typeName:"主語-解説型エラー",jp:"留学で友達を作れる。",answer:"You can make friends by studying abroad.",mistake:"Studying abroad can makes friends.",hint:"「作る」のは誰？→ You を主語にしよう。ヒント表現: make friends（友達を作る）/ by studying abroad"},
  {id:"1-08",type:1,typeName:"主語-解説型エラー",jp:"留学で人として成長できる。",answer:"You can grow as a person through studying abroad.",mistake:"Studying abroad can grow up for you.",hint:"「成長する」のは誰？→ You を主語にしよう。ヒント表現: grow as a person（人として成長する）/ through studying abroad"},
  {id:"1-09",type:1,typeName:"主語-解説型エラー",jp:"この経験を面接で話せる。",answer:"You can talk about this experience in a job interview.",mistake:"This experience can say for company interview.",hint:"「話す」のは誰？→ You を主語にしよう。ヒント表現: talk about this experience（この経験を話す）/ in a job interview（面接で）"},
  {id:"1-11",type:1,typeName:"主語-解説型エラー",jp:"留学でコミュニケーション能力を高められる。",answer:"You can improve your communication skills by studying abroad.",mistake:"Studying abroad can improve communication skills.",hint:"「高める」のは誰？→ You を主語にしよう。ヒント表現: improve your communication skills（コミュニケーション能力を高める）"},
  {id:"1-12",type:1,typeName:"主語-解説型エラー",jp:"アルバイトでお金を稼げる。",answer:"You can earn money by working part-time.",mistake:"Part-time job can earn money.",hint:"「稼ぐ」のは誰？→ You を主語にしよう。ヒント表現: earn money（お金を稼ぐ）/ by working part-time（バイトをして）"},
  {id:"1-13",type:1,typeName:"主語-解説型エラー",jp:"この本で多くのことを学べる。",answer:"You can learn many things from this book.",mistake:"This book can learn many things.",hint:"「学ぶ」のは誰？→ You を主語にしよう。ヒント表現: learn many things（多くのことを学ぶ）/ from this book（この本から）"},
  {id:"1-14",type:1,typeName:"主語-解説型エラー",jp:"インターネットで情報を得られる。",answer:"You can get information through the internet.",mistake:"The internet can get information.",hint:"「得る」のは誰？→ You を主語にしよう。ヒント表現: get information（情報を得る）/ through the internet（インターネットで）"},
  {id:"1-15",type:1,typeName:"主語-解説型エラー",jp:"スポーツで体力をつけられる。",answer:"You can build your stamina by playing sports.",mistake:"Sports can build stamina.",hint:"「つける」のは誰？→ You を主語にしよう。ヒント表現: build your stamina（体力をつける）/ by playing sports（スポーツをして）"},
  {id:"1-16",type:1,typeName:"主語-解説型エラー",jp:"ボランティア活動で社会に貢献できる。",answer:"You can contribute to society through volunteer activities.",mistake:"Volunteer activities can contribute to society.",hint:"「貢献する」のは誰？→ You を主語にしよう。ヒント表現: contribute to society（社会に貢献する）/ through volunteer activities"},
  {id:"1-17",type:1,typeName:"主語-解説型エラー",jp:"旅行で新しい経験ができる。",answer:"You can have new experiences by traveling.",mistake:"Traveling can have new experiences.",hint:"「経験する」のは誰？→ You を主語にしよう。ヒント表現: have new experiences（新しい経験をする）/ by traveling（旅行をして）"},
  {id:"1-18",type:1,typeName:"主語-解説型エラー",jp:"音楽でリラックスできる。",answer:"You can relax by listening to music.",mistake:"Music can relax.",hint:"「リラックスする」のは誰？→ You を主語にしよう。ヒント表現: relax（リラックスする）/ by listening to music（音楽を聴いて）"},
  {id:"2-01",type:2,typeName:"長い主語型エラー",jp:"私が最も訪れたいのは京都だ",answer:"The place I would like to visit most is Kyoto.",mistake:"I would like to visit most is Kyoto.",hint:"is の前が文(S+V)になっていない？→ 名詞句にしよう。ヒント表現: The place I would like to visit most（私が最も訪れたい場所）"},
  {id:"2-02",type:2,typeName:"長い主語型エラー",jp:"海外の友だちを持つことは、自信を高めます。",answer:"The opportunity of having a global friend is connected to your confidence.",mistake:"You have a global friend is connecting your confidence.",hint:"is の前が文(S+V)になっていない？→ 名詞句にしよう。ヒント表現: Having a global friend / The opportunity of having...（海外の友達を持つこと）"},
  {id:"2-03",type:2,typeName:"長い主語型エラー",jp:"留学することはとても重要な経験です。",answer:"Studying abroad is a very important experience.",mistake:"I study abroad is very important experience.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Studying abroad（留学すること）+ is a very important experience"},
  {id:"2-04",type:2,typeName:"長い主語型エラー",jp:"他国の人々と交流することは、私の将来にとって役立ちます。",answer:"Connecting with people from other countries is a future benefit for me.",mistake:"I connect with people from other countries it is a future benefit for me.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Connecting with people from other countries（他国の人々と交流すること）"},
  {id:"2-05",type:2,typeName:"長い主語型エラー",jp:"外国語を学ぶことは将来の仕事に役立つ。",answer:"Learning a foreign language is useful for your future career.",mistake:"I learn a foreign language is useful for future job.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Learning a foreign language（外国語を学ぶこと）+ is useful for your future career"},
  {id:"2-06",type:2,typeName:"長い主語型エラー",jp:"毎日運動することは健康に良い。",answer:"Exercising every day is good for your health.",mistake:"Every day I exercise is good for health.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Exercising every day（毎日運動すること）+ is good for your health"},
  {id:"2-07",type:2,typeName:"長い主語型エラー",jp:"読書をすることは語彙力を増やす。",answer:"Reading books increases your vocabulary.",mistake:"I read books is increase vocabulary.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Reading books（読書すること）+ increases your vocabulary（語彙力を増やす）"},
  {id:"2-08",type:2,typeName:"長い主語型エラー",jp:"早起きすることは成功の秘訣だ。",answer:"Getting up early is the key to success.",mistake:"I get up early is the key to success.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Getting up early（早起きすること）+ is the key to success（成功の秘訣）"},
  {id:"2-09",type:2,typeName:"長い主語型エラー",jp:"一人暮らしをすることは自立心を育てる。",answer:"Living alone helps you develop independence.",mistake:"I live alone is develop independence.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Living alone（一人暮らしすること）+ helps you develop independence（自立心を育てる）"},
  {id:"2-10",type:2,typeName:"長い主語型エラー",jp:"新しいことに挑戦することは大切だ。",answer:"Trying new things is important.",mistake:"I try new things is important.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Trying new things（新しいことに挑戦すること）+ is important"},
  {id:"2-11",type:2,typeName:"長い主語型エラー",jp:"異文化を理解することは国際社会で必要だ。",answer:"Understanding different cultures is necessary in a global society.",mistake:"I understand different cultures is necessary in global society.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Understanding different cultures（異文化を理解すること）+ is necessary in a global society"},
  {id:"2-12",type:2,typeName:"長い主語型エラー",jp:"SNSを使いすぎることは問題がある。",answer:"Using social media too much is problematic.",mistake:"I use SNS too much is have problems.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Using social media too much（SNSを使いすぎること）+ is problematic"},
  {id:"2-13",type:2,typeName:"長い主語型エラー",jp:"ボランティアに参加することは社会勉強になる。",answer:"Participating in volunteer work is a good way to learn about society.",mistake:"I participate volunteer is learning society.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Participating in volunteer work（ボランティアに参加すること）+ is a good way to learn about society"},
  {id:"2-14",type:2,typeName:"長い主語型エラー",jp:"自分の意見を英語で伝えることは難しい。",answer:"Expressing your opinion in English is difficult.",mistake:"I express my opinion in English is difficult.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Expressing your opinion in English（自分の意見を英語で伝えること）+ is difficult"},
  {id:"2-15",type:2,typeName:"長い主語型エラー",jp:"他の国の料理を食べることは文化を知るきっかけになる。",answer:"Eating food from other countries is a good opportunity to learn about their culture.",mistake:"I eat other country food is chance to know culture.",hint:"is の前が文(S+V)になっていない？→ 動名詞にしよう。ヒント表現: Eating food from other countries（他の国の料理を食べること）+ is a good opportunity to learn about their culture"},
  {id:"3-01",type:3,typeName:"動詞が2つ続くエラー",jp:"海外の友達がいると自信につながる。",answer:"Having a global friend builds your confidence.",mistake:"You have a global friend is connecting your confidence.",hint:"動詞は1つだけ！ have と is を一緒に使わない。ヒント表現: Having a global friend（海外の友達がいること）+ builds your confidence（自信につながる）"},
  {id:"3-02",type:3,typeName:"動詞が2つ続くエラー",jp:"私たちは世界中の多くの人とつながれる。",answer:"We can connect with a lot of people in the world.",mistake:"We are can connect a lot of people in the world.",hint:"are と can を一緒に使わない → can だけ。ヒント表現: We can connect with（つながれる）/ a lot of people in the world"},
  {id:"3-03",type:3,typeName:"動詞が2つ続くエラー",jp:"大学生は留学すべきだ。",answer:"University students should study abroad.",mistake:"University students should be study abroad.",hint:"should の後は動詞の原形 → should study。ヒント表現: University students should study abroad（留学すべきだ）"},
  {id:"3-04",type:3,typeName:"動詞が2つ続くエラー",jp:"その経験が精神的成長を助ける。",answer:"These experiences help their mental growth.",mistake:"The experiences are grow up their mental.",hint:"are と grow を一緒に使わない。ヒント表現: These experiences help their mental growth（精神的成長を助ける）"},
  {id:"3-05",type:3,typeName:"動詞が2つ続くエラー",jp:"グローバル化が世界中で進んでいる。",answer:"Globalization is progressing around the world.",mistake:"Globalization is progress around the world.",hint:"進行形は is + ~ing → is progressing。ヒント表現: Globalization is progressing（進んでいる）/ around the world"},
  {id:"3-06",type:3,typeName:"動詞が2つ続くエラー",jp:"私はたくさんの食べ物を楽しめると思う。",answer:"I think I will enjoy many kinds of food.",mistake:"I think I will be enjoy many foods.",hint:"will の後は動詞の原形 → will enjoy。ヒント表現: I think I will enjoy（楽しめると思う）/ many kinds of food"},
  {id:"3-07",type:3,typeName:"動詞が2つ続くエラー",jp:"留学は私たちの成長につながる。",answer:"Studying abroad will help us grow.",mistake:"Studying abroad will be connect our grows.",hint:"will の後は動詞の原形 → will help。ヒント表現: Studying abroad will help us grow（成長を助ける）"},
  {id:"3-08",type:3,typeName:"動詞が2つ続くエラー",jp:"留学では私たちは教科書からだけ学ぶのではない。",answer:"Through studying abroad, we do not only learn from textbooks.",mistake:"Studying abroad experience is not learn only textbook.",hint:"is と learn を一緒に使わない。ヒント表現: Through studying abroad,（留学を通して）/ we do not only learn from textbooks"},
  {id:"3-09",type:3,typeName:"動詞が2つ続くエラー",jp:"英語を話すことは重要だ。",answer:"Speaking English is important.",mistake:"Speaking English is be important.",hint:"is の後に be は不要 → is important。ヒント表現: Speaking English is important（英語を話すことは重要だ）"},
  {id:"3-10",type:3,typeName:"動詞が2つ続くエラー",jp:"彼らは毎日練習している。",answer:"They are practicing every day.",mistake:"They are practice every day.",hint:"進行形は are + ~ing → are practicing。ヒント表現: They are practicing（練習している）/ every day"},
  {id:"3-11",type:3,typeName:"動詞が2つ続くエラー",jp:"私たちは英語を勉強できる。",answer:"We can study English.",mistake:"We are can study English.",hint:"are と can を一緒に使わない → can だけ。ヒント表現: We can study English（英語を勉強できる）"},
  {id:"3-12",type:3,typeName:"動詞が2つ続くエラー",jp:"彼女は上手に歌える。",answer:"She can sing well.",mistake:"She is can sing well.",hint:"is と can を一緒に使わない → can だけ。ヒント表現: She can sing well（上手に歌える）"},
  {id:"3-13",type:3,typeName:"動詞が2つ続くエラー",jp:"学生たちは一生懸命勉強しなければならない。",answer:"Students must study hard.",mistake:"Students must be study hard.",hint:"must の後は動詞の原形 → must study。ヒント表現: Students must study hard（一生懸命勉強しなければならない）"},
  {id:"3-14",type:3,typeName:"動詞が2つ続くエラー",jp:"私は将来教師になりたい。",answer:"I want to become a teacher in the future.",mistake:"I am want to become a teacher.",hint:"am と want を一緒に使わない → want だけ。ヒント表現: I want to become a teacher（教師になりたい）/ in the future"},
  {id:"3-15",type:3,typeName:"動詞が2つ続くエラー",jp:"彼は毎朝走っている。",answer:"He runs every morning.",mistake:"He is run every morning.",hint:"習慣は一般動詞だけ → runs。ヒント表現: He runs every morning（毎朝走っている）※進行形なら is running"},
  {id:"3-16",type:3,typeName:"動詞が2つ続くエラー",jp:"私たちはその問題を解決すべきだ。",answer:"We should solve that problem.",mistake:"We should be solve that problem.",hint:"should の後は動詞の原形 → should solve。ヒント表現: We should solve that problem（その問題を解決すべきだ）"},
  {id:"3-17",type:3,typeName:"動詞が2つ続くエラー",jp:"彼らは新しいスキルを学んでいる。",answer:"They are learning new skills.",mistake:"They are learn new skills.",hint:"進行形は are + ~ing → are learning。ヒント表現: They are learning new skills（新しいスキルを学んでいる）"},
  {id:"4-01",type:4,typeName:"主語または動詞がない文",jp:"学生はまず語学力を伸ばし、考え方を身につけられる。",answer:"First, students can improve their language skills and develop a new way of thinking.",mistake:"First, grow up language skill and have a mind.",hint:"「誰が」伸ばすのか？→ students can を追加。ヒント表現: First, students can improve（まず伸ばせる）/ their language skills and develop a new way of thinking"},
  {id:"4-02",type:4,typeName:"主語または動詞がない文",jp:"あなたが英語だけの場所に行けば、英語が上達する。",answer:"If you go to a place where people speak only English, you can improve your English quickly.",mistake:"If speak English only people place, you can speak English very speedy.",hint:"if の後に主語 you を追加。ヒント表現: If you go to a place where...（もし〜の場所に行けば）/ you can improve your English quickly"},
  {id:"4-03",type:4,typeName:"主語または動詞がない文",jp:"あなたは自分の力で生きる力を身につけられる。",answer:"You can gain the strength to live on your own.",mistake:"Gain the strength to survive on your own.",hint:"主語がない → You can を追加。ヒント表現: You can gain the strength（力を身につけられる）/ to live on your own（自分の力で）"},
  {id:"4-04",type:4,typeName:"主語または動詞がない文",jp:"私はスピーキングとライティングを伸ばせると思う。",answer:"I think I can improve my speaking and writing skills.",mistake:"I think grow up my skills speaking and writing.",hint:"think の後に I can を追加。ヒント表現: I think I can improve（伸ばせると思う）/ my speaking and writing skills"},
  {id:"4-05",type:4,typeName:"主語または動詞がない文",jp:"私は多くの文化について学べると思う。",answer:"I think I can learn about many cultures.",mistake:"I think know many culture.",hint:"think の後に I can を追加。ヒント表現: I think I can learn about（学べると思う）/ many cultures（多くの文化）"},
  {id:"4-06",type:4,typeName:"主語または動詞がない文",jp:"私は将来、一人暮らしに役立つと思う。",answer:"I think it will help me live independently in the future.",mistake:"I think help for alone life style in the future.",hint:"think の後に it will を追加。ヒント表現: I think it will help me（役立つと思う）/ live independently（一人暮らし）/ in the future"},
  {id:"4-07",type:4,typeName:"主語または動詞がない文",jp:"異文化を理解することが大切だ。",answer:"It is important to understand different cultures.",mistake:"Important to understand different cultures.",hint:"主語がない → It is を追加。ヒント表現: It is important to understand（理解することが大切だ）/ different cultures（異文化）"},
  {id:"4-08",type:4,typeName:"主語または動詞がない文",jp:"あなたは毎日英語を練習すべきだ。",answer:"You should practice English every day.",mistake:"Should practice English every day.",hint:"主語がない → You を追加。ヒント表現: You should practice（練習すべきだ）/ English every day（毎日英語を）"},
  {id:"4-09",type:4,typeName:"主語または動詞がない文",jp:"あなたは新しい友達を作ることができる。",answer:"You can make new friends.",mistake:"Can make new friends.",hint:"主語がない → You を追加。ヒント表現: You can make new friends（新しい友達を作れる）"},

function normalize(s){return s.toLowerCase().replace(/['']/g,"'").replace(/[""]/g,'"').replace(/\s+/g," ").replace(/[.,!?;:]+$/g,"").trim()}

function checkAnswer(input,answer){
  const n=normalize(input),a=normalize(answer);
  if(n===a)return"correct";
  const w1=n.split(" "),w2=a.split(" ");
  let c=0;const s2=new Set(w2);
  w1.forEach(w=>{if(s2.has(w))c++});
  const sim=c/Math.max(w1.length,w2.length);
  if(sim>=0.5)return"close";
  return"wrong";
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function App(){
  const[screen,setScreen]=useState("home");
  const[selectedType,setSelectedType]=useState(null);
  const[questions,setQuestions]=useState([]);
  const[currentIdx,setCurrentIdx]=useState(0);
  const[userInput,setUserInput]=useState("");
  const[result,setResult]=useState(null);
  const[showHint,setShowHint]=useState(false);
  const[showMistake,setShowMistake]=useState(false);
  const[score,setScore]=useState({correct:0,close:0,wrong:0});
  const[isListening,setIsListening]=useState(false);
  const inputRef=useRef(null);
  const recRef=useRef(null);

  const startListening=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("お使いのブラウザは音声認識に対応していません。Chrome をお使いください。");return}
    const r=new SR();r.lang="en-US";r.interimResults=true;r.continuous=false;
    r.onresult=(e)=>{let f="",im="";for(let i=0;i<e.results.length;i++){if(e.results[i].isFinal)f+=e.results[i][0].transcript;else im+=e.results[i][0].transcript}setUserInput(f||im)};
    r.onend=()=>setIsListening(false);
    r.onerror=()=>setIsListening(false);
    recRef.current=r;r.start();setIsListening(true);
  },[]);

  const stopListening=useCallback(()=>{if(recRef.current)recRef.current.stop();setIsListening(false)},[]);

  const startQuiz=(type)=>{
    let qs;
    if(type==="random"){qs=shuffle(QUESTIONS);setSelectedType("random")}
    else{qs=shuffle(QUESTIONS.filter(q=>q.type===type));setSelectedType(type)}
    setQuestions(qs);setCurrentIdx(0);setUserInput("");setResult(null);setShowHint(false);setShowMistake(false);setScore({correct:0,close:0,wrong:0});setScreen("quiz");
  };

  const handleSubmit=()=>{if(!userInput.trim())return;const q=questions[currentIdx];const res=checkAnswer(userInput,q.answer);setResult(res);setScore(p=>({...p,[res]:p[res]+1}))};

  const handleNext=()=>{
    if(currentIdx+1>=questions.length){setScreen("complete");return}
    setCurrentIdx(p=>p+1);setUserInput("");setResult(null);setShowHint(false);setShowMistake(false);
    setTimeout(()=>inputRef.current&&inputRef.current.focus(),100);
  };

  const handleRetry=()=>{setUserInput("");setResult(null);setTimeout(()=>inputRef.current&&inputRef.current.focus(),100)};

  const q=questions[currentIdx];
  const meta=q?TYPE_META[q.type]:null;
  const progress=questions.length>0?((currentIdx+(result?1:0))/questions.length)*100:0;

  if(screen==="home")return(
    <div style={{maxWidth:640,margin:"0 auto",padding:"40px 20px 60px",display:"flex",flexDirection:"column",gap:12}}>
      <div style={{animation:"fadeInUp 0.5s ease-out"}}>
        <h1 style={{fontFamily:"'Outfit','Noto Sans JP'",fontSize:32,fontWeight:900,textAlign:"center",color:"#1A1612",letterSpacing:-0.5,marginBottom:4}}>英作文エラー練習</h1>
        <p style={{textAlign:"center",color:"#8C8278",fontSize:14,marginBottom:20}}>日本語を英語に訳して、よくあるエラーを克服しよう</p>
      </div>
      <button onClick={()=>startQuiz("random")} style={{display:"flex",alignItems:"center",gap:14,padding:"18px 20px",background:"#fff",borderRadius:16,border:"2px dashed #D4CEC6",cursor:"pointer",textAlign:"left",width:"100%",transition:"all 0.2s",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",animation:"fadeInUp 0.5s ease-out 0.1s both"}}>
        <span style={{fontSize:28}}>🎯</span>
        <div><div style={{fontWeight:700,fontSize:16,color:"#1A1612"}}>すべてのタイプからランダム出題</div><div style={{fontSize:13,color:"#8C8278",marginTop:2}}>全98問からランダムに出題</div></div>
      </button>
      {[1,2,3,4,5,6].map((type,i)=>{const m=TYPE_META[type];return(
        <button key={type} onClick={()=>startQuiz(type)} style={{display:"block",width:"100%",padding:"16px 20px",background:"#fff",borderRadius:14,borderLeft:"4px solid "+m.color,border:"1px solid #EDE8E3",borderLeftWidth:4,borderLeftStyle:"solid",borderLeftColor:m.color,cursor:"pointer",textAlign:"left",transition:"all 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.04)",animation:`fadeInUp 0.5s ease-out ${0.15+i*0.06}s both`}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:32,lineHeight:1}}>{m.emoji}</span>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{display:"inline-block",padding:"2px 10px",borderRadius:6,color:"#fff",fontSize:12,fontWeight:700,fontFamily:"Outfit",background:m.color}}>{m.label}</span>
                <span style={{fontSize:12,color:"#8C8278"}}>{m.count}問</span>
              </div>
              <div style={{fontWeight:700,fontSize:15,color:"#1A1612",marginBottom:4}}>{m.name}</div>
              <div style={{fontSize:12.5,color:"#8C8278",lineHeight:1.6}}>{m.desc}</div>
            </div>
            <span style={{color:"#C8C0B8",fontSize:20}}>›</span>
          </div>
        </button>
      )})}
    </div>
  );

  if(screen==="quiz"&&q)return(
    <div style={{maxWidth:640,margin:"0 auto",padding:"0 16px 80px",minHeight:"100vh"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0 8px"}}>
        <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:14,color:"#8C8278",cursor:"pointer",padding:"4px 0"}}>← 戻る</button>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{display:"inline-block",padding:"2px 8px",borderRadius:5,color:"#fff",fontSize:11,fontWeight:700,fontFamily:"Outfit",background:meta.color}}>{selectedType==="random"?"ランダム":meta.label}</span>
          <span style={{fontSize:13,color:"#8C8278",fontFamily:"Outfit",fontWeight:500}}>{currentIdx+1} / {questions.length}</span>
        </div>
      </div>

      <div style={{height:4,background:"#EDE8E3",borderRadius:2,overflow:"hidden",marginBottom:20}}>
        <div style={{height:"100%",borderRadius:2,transition:"width 0.4s ease-out",width:progress+"%",background:meta.color}}/>
      </div>

      <div style={{background:"#fff",borderRadius:16,padding:"24px 20px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:16,animation:"fadeInUp 0.4s ease-out"}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12,display:"flex",alignItems:"center",gap:6,color:meta.color}}>
          <span>{meta.emoji}</span> {meta.name}
        </div>
        <div style={{fontSize:22,fontWeight:700,color:"#1A1612",lineHeight:1.6}}>{q.jp}</div>
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={()=>setShowHint(!showHint)} style={{padding:"7px 14px",borderRadius:20,border:"1.5px solid "+(showHint?"#FFB300":"#D4CEC6"),background:showHint?"#FFF8E1":"#fff",fontSize:13,cursor:"pointer",transition:"all 0.2s",color:showHint?"#F57F17":"#5C564E"}}>💡 ヒント</button>
          <button onClick={()=>setShowMistake(!showMistake)} style={{padding:"7px 14px",borderRadius:20,border:"1.5px solid "+(showMistake?"#EF5350":"#D4CEC6"),background:showMistake?"#FFEBEE":"#fff",fontSize:13,cursor:"pointer",transition:"all 0.2s",color:showMistake?"#C62828":"#5C564E"}}>🔊 よくある間違い</button>
        </div>
        {showHint&&<div style={{marginTop:12,padding:"12px 16px",background:"#FFFDE7",borderRadius:10,fontSize:14,color:"#F57F17",lineHeight:1.6,display:"flex",gap:8}}>💡 {q.hint}</div>}
        {showMistake&&<div style={{marginTop:8,padding:"12px 16px",background:"#FFF5F5",borderRadius:10,fontSize:14,lineHeight:1.6}}><span style={{color:"#C62828",fontWeight:700}}>✗</span> <span style={{color:"#C62828"}}>よくある間違い: </span><span style={{color:"#C62828",fontStyle:"italic"}}>{q.mistake}</span></div>}
      </div>

      {!result&&(
        <div style={{background:"#fff",borderRadius:16,padding:16,boxShadow:"0 2px 12px rgba(0,0,0,0.06)",animation:"fadeInUp 0.4s ease-out 0.1s both"}}>
          <textarea ref={inputRef} value={userInput} onChange={e=>setUserInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSubmit()}}} placeholder="英語で入力してください..." style={{width:"100%",border:"none",fontSize:16,resize:"none",fontFamily:"'Outfit','Noto Sans JP'",lineHeight:1.6,color:"#1A1612",background:"transparent"}} rows={3}/>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:8}}>
            <button onClick={isListening?stopListening:startListening} style={{width:44,height:44,borderRadius:"50%",border:"none",background:isListening?"#C62828":"#F5F0EB",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",animation:isListening?"micPulse 1.5s infinite":"none"}}>
              {isListening
                ?<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                :<svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="#888"/><path d="M19 10v2a7 7 0 0 1-14 0v-2" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round"/><line x1="12" y1="19" x2="12" y2="23" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round"/></svg>
              }
            </button>
            <button onClick={handleSubmit} disabled={!userInput.trim()} style={{width:44,height:44,borderRadius:"50%",border:"none",background:"#1565C0",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:userInput.trim()?1:0.4,transition:"all 0.2s"}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
          <div style={{fontSize:11.5,color:"#B0A89F",textAlign:"center",marginTop:8}}>🎙 音声入力後、テキストを修正してから送信できます</div>
        </div>
      )}

      {result&&(
        <div style={{animation:"fadeInUp 0.4s ease-out"}}>
          <div style={{background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"20px 20px 12px"}}>
              <span style={{fontSize:36,animation:"pulse 0.6s ease-out"}}>{result==="correct"?"🎉":result==="close"?"💪":"📖"}</span>
              <span style={{fontSize:20,fontWeight:700,color:result==="correct"?"#2E7D32":result==="close"?"#E65100":"#C62828"}}>{result==="correct"?"正解！すばらしい！":result==="close"?"惜しい！もう少し！":"もう一度挑戦しよう！"}</span>
            </div>
            <div style={{padding:"0 20px 20px"}}>
              <div style={{fontSize:12,color:"#8C8278",marginBottom:4}}>あなたの回答：</div>
              <div style={{fontSize:17,lineHeight:1.6,fontFamily:"'Outfit','Noto Sans JP'",color:result==="correct"?"#2E7D32":"#C62828",textDecoration:result!=="correct"?"line-through":"none"}}>{userInput}</div>
              {result!=="correct"&&(<><div style={{fontSize:12,color:"#8C8278",marginBottom:4,marginTop:12}}>正しい英文：</div><div style={{fontSize:17,lineHeight:1.6,fontFamily:"'Outfit','Noto Sans JP'",color:"#1565C0",fontWeight:600}}>{q.answer}</div></>)}
              <div style={{marginTop:16,padding:"10px 14px",background:"#FAF8F5",borderRadius:8,fontSize:13,color:"#8C8278"}}>📖 {result==="correct"?"完璧です！次の問題に進みましょう。":"模範解答と比較してみましょう。"}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:12}}>
            {result!=="correct"&&<button onClick={handleRetry} style={{flex:1,padding:14,borderRadius:14,border:"2px solid #D4CEC6",background:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",color:"#5C564E"}}>↻ もう一度</button>}
            <button onClick={handleNext} style={{flex:1,padding:14,borderRadius:14,border:"none",background:"#C62828",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer"}}>次の問題 ›</button>
          </div>
        </div>
      )}
    </div>
  );

  if(screen==="complete"){
    const pct=Math.round((score.correct/questions.length)*100);
    return(
      <div style={{maxWidth:640,margin:"0 auto",padding:"60px 20px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
        <div style={{animation:"fadeInUp 0.5s ease-out",textAlign:"center"}}>
          <div style={{fontSize:64,marginBottom:16}}>🎓</div>
          <h2 style={{fontSize:26,fontWeight:900,color:"#1A1612",marginBottom:4,fontFamily:"'Outfit','Noto Sans JP'"}}>おつかれさまでした！</h2>
          <p style={{fontSize:14,color:"#8C8278",marginBottom:32}}>全 {questions.length} 問完了</p>
          <div style={{display:"flex",gap:12,marginBottom:32}}>
            <div style={{flex:1,padding:"16px 12px",background:"#fff",borderRadius:14,border:"2px solid #4CAF50",textAlign:"center"}}><div style={{fontSize:32,fontWeight:700,color:"#2E7D32",fontFamily:"Outfit"}}>{score.correct}</div><div style={{fontSize:13,color:"#5C564E",marginTop:4}}>🎉 正解</div></div>
            <div style={{flex:1,padding:"16px 12px",background:"#fff",borderRadius:14,border:"2px solid #FF9800",textAlign:"center"}}><div style={{fontSize:32,fontWeight:700,color:"#E65100",fontFamily:"Outfit"}}>{score.close}</div><div style={{fontSize:13,color:"#5C564E",marginTop:4}}>💪 惜しい</div></div>
            <div style={{flex:1,padding:"16px 12px",background:"#fff",borderRadius:14,border:"2px solid #F44336",textAlign:"center"}}><div style={{fontSize:32,fontWeight:700,color:"#C62828",fontFamily:"Outfit"}}>{score.wrong}</div><div style={{fontSize:13,color:"#5C564E",marginTop:4}}>📖 不正解</div></div>
          </div>
          <div style={{position:"relative",width:120,height:120,margin:"0 auto 32px",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="#EDE8E3" strokeWidth="8"/><circle cx="60" cy="60" r="52" fill="none" stroke="#2E7D32" strokeWidth="8" strokeDasharray={pct*3.267+" 326.7"} strokeLinecap="round" transform="rotate(-90 60 60)" style={{transition:"stroke-dasharray 1s ease-out"}}/></svg>
            <div style={{position:"absolute",fontSize:28,fontWeight:700,fontFamily:"Outfit",color:"#2E7D32"}}>{pct}%</div>
          </div>
          <button onClick={()=>setScreen("home")} style={{padding:"14px 48px",borderRadius:14,border:"none",background:"#1A1612",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer"}}>ホームに戻る</button>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
